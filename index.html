<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorfly Studio -"Palette Generator"</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Generador de Paletas Interactivo</h1>
        <p>Herramienta interna de Colorfly Studio</p>
    </header>

    <main>
        <section id="controls">
            <div class="control-panel">
                <label for="palette-size">Selecciona la cantidad de colores</label>
                <select name="palette-size" id="palette-size" >
                    <option value="6">6</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                </select><br>
                <label for="palette-format">Selecciona el formato</label>
                <select name="palette-format" id="palette-format">
                    <option value="hex">HEX</option>
                    <option value="hsl">HSL</option>
                </select>                
            </div>
            <div class="button-generator">
                <button id="btn-generator">Generar Paleta</button>                
            </div>
        </section>
        <section id="palette-container">
            <div class="palette-container"></div>
            <button id="btn-download">Descargar Paleta</button>
        </section>
    </main>
    <footer>
        <div class="copyright-data">
            <p class="since">© 2026| Colorfly Studio</p>
            <p class="developed-by">Developed by <a href="https://github.com/MarcosLuna87-Dev" target="_blank" rel="noopener noreferrer">Marcos Luna</a></p>
        </div>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
